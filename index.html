
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Georgia WMS Conference 2026 Program</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

header{
    background:#5a0f2e;
    color:white;
    padding:16px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:20px;
}

header p{
    margin:4px 0 0 0;
    font-size:14px;
}

#viewer{
    width:100%;
    height:calc(100vh - 80px);
}

.toolbar{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:white;
    border-bottom:1px solid #ddd;
}

button{
    padding:10px 14px;
    font-size:14px;
    border:none;
    background:#5a0f2e;
    color:white;
    border-radius:4px;
}

button:hover{
    background:#7c1a43;
}

canvas{
    display:block;
    margin:auto;
    max-width:100%;
}

@media (max-width:768px){
    header h1{font-size:16px;}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<header>
<h1>South Georgia Conference WMS</h1>
<p>2026 Annual Conference Program</p>
</header>

<div class="toolbar">
<button onclick="prevPage()">Previous</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

<div id="viewer">
<canvas id="pdfCanvas"></canvas>
</div>

<script>
const url = "program.pdf";

let pdfDoc = null;
let pageNum = 1;
let canvas = document.getElementById("pdfCanvas");
let ctx = canvas.getContext("2d");

pdfjsLib.getDocument(url).promise.then(function(pdf){
    pdfDoc = pdf;
    renderPage(pageNum);
});

function renderPage(num){
    pdfDoc.getPage(num).then(function(page){
        let viewport = page.getViewport({scale:1.5});
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        let renderContext = {
            canvasContext: ctx,
            viewport: viewport
        };

        page.render(renderContext);
        document.getElementById("pageInfo").innerText = "Page " + num + " / " + pdfDoc.numPages;
    });
}

function prevPage(){
    if(pageNum <= 1) return;
    pageNum--;
    renderPage(pageNum);
}

function nextPage(){
    if(pageNum >= pdfDoc.numPages) return;
    pageNum++;
    renderPage(pageNum);
}
</script>

</body>
</html>
